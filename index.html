<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Barceló Desalia – Vive Ahora</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: linear-gradient(to bottom, #F7A84E 0%, #ED7B8A 38%, #C480B8 68%, #2DC8B2 100%);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      font-family: "'Press Start 2P'", monospace;
    }

    /* ── Franjas top/bottom ── */
    .stripe { position: fixed; left:0; right:0; height:20px; z-index:200; pointer-events:none;
      background: repeating-linear-gradient(90deg,#F5A14A 0,#F5A14A 34px,#F0896A 34px,#F0896A 68px,#2DC8B2 68px,#2DC8B2 102px); }
    .stripe.top    { top:0; }
    .stripe.bottom { bottom:0; }

    /* ── Columnas skin: fixed, independientes del contenido ── */
    #cv-left {
      position: fixed; top:0; left:0;
      width:300px; height:100vh;
      display:block; z-index:10; pointer-events:none;
    }
    #cv-right {
      position: fixed; top:0; right:0;
      width:300px; height:100vh;
      display:block; z-index:10; pointer-events:none;
    }

    /* ── Banner 300×600: fixed derecho, independiente ── */
    #banner {
      position: fixed; top:36px; right:0;
      width:300px; height:600px;
      display:block; cursor:pointer; z-index:20;
    }

    /* ── Panel central de inicio ── */
    #start-panel {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    #cv-start {
      display: block;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      cursor: pointer;
    }

    /* ── Overlays ── */
    .fl-overlay {
      display:none; position:fixed; inset:0; z-index:999999;
      background:rgba(0,0,0,.85);
      justify-content:center; align-items:center; touch-action:none;
    }
    .fl-overlay.open { display:flex; }
    #skin-canvas, #game {
      display:block; cursor:pointer;
      border-radius:18px; box-shadow:0 28px 90px rgba(0,0,0,.75);
    }
    .xbtn {
      position:fixed; top:28px; right:22px; z-index:1000000;
      width:44px; height:44px; background:rgba(0,0,0,.65);
      color:white; border:2px solid rgba(255,255,255,.5); border-radius:50%;
      font-size:20px; font-weight:bold; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-family:monospace; transition:background .2s;
    }
    .xbtn:hover { background:rgba(220,0,0,.85); }
  </style>
</head>
<body>

<div class="stripe top"></div>
<div class="stripe bottom"></div>

<!-- Columnas skin laterales (fixed, independientes) -->
<canvas id="cv-left"  width="300"></canvas>
<canvas id="cv-right" width="300"></canvas>

<!-- Banner derecho (fixed, independiente) -->
<canvas id="banner" width="300" height="600"></canvas>

<!-- Panel central de inicio de juego -->
<div id="start-panel">
  <canvas id="cv-start" width="480" height="520"></canvas>
</div>

<!-- Overlay: selector de personaje -->
<div id="skin-overlay" class="fl-overlay">
  <canvas id="skin-canvas" width="960" height="540"></canvas>
  <button class="xbtn" id="skin-xbtn">✕</button>
</div>

<!-- Overlay: juego -->
<div id="game-overlay" class="fl-overlay">
  <canvas id="game" width="960" height="540"></canvas>
  <button class="xbtn" id="game-xbtn">✕</button>
</div>

<script>
(function(){
'use strict';
const CDN = 'https://cdn.jsdelivr.net/gh/cserenissimo/wuolah-desalia@master/';
const PIXEL = "'Press Start 2P','Courier New',monospace";

// ── ASSETS ──────────────────────────────────────────────────────────
const IMG = {};
const ASSET_MAP = {
  logo:     CDN+'materiales/Material/Group%203.png',
  bgPalm:   CDN+'materiales/Material/Vector%20(4).png',
  pixPalm:  CDN+'materiales/Material/Vector%20(3).png',
  sand:     CDN+'materiales/Material/Vector%20(1).png',
  ramp:     CDN+'materiales/Material/Group%201.png',
  flamingo: CDN+'materiales/Material/flamenco%204.png',
  palmObs:  CDN+'materiales/Material/plamera%201.png',
  copa:     CDN+'materiales/Material/copa%201.png',
  bottle:   CDN+'materiales/Material/Vector.png',
  sign:     CDN+'materiales/Material/vive%20ahora%20se%C3%B1al.png',
  suitcase: CDN+'materiales/Material/maleta%203%201.png',
  duck0:    CDN+'materiales/Material/pato.png',
  duck1:    CDN+'materiales/Material/pato%20pixel%20art%202%201.png',
  duck2:    CDN+'materiales/Material/pato%20pixel%20art%207%201.png',
  duck3:    CDN+'materiales/Material/pato%20pixel%20art%206%201.png',
  duck4:    CDN+'materiales/Material/pato%20pixel%20art%205%201.png',
};
let assetsLoaded = 0;
const assetsTotal = Object.keys(ASSET_MAP).length;
Object.entries(ASSET_MAP).forEach(([k,src])=>{
  const im = new Image(); im.crossOrigin='anonymous';
  im.onload = im.onerror = ()=> assetsLoaded++;
  im.src = src; IMG[k] = im;
});

const GROUND_RATIO = 0.72, WATER_RATIO = 0.84;
const STRIPE_3 = ['#F5A14A','#F0896A','#2DC8B2'];

function di(ctx,k,x,y,w,h){ const im=IMG[k]; if(im&&im.naturalWidth) ctx.drawImage(im,x,y,w,h); }
function rr(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);     ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function stripes(ctx,W,H){
  const SH=20;
  for(let i=0;i*34<W+34;i++){
    ctx.fillStyle=STRIPE_3[i%3];
    ctx.fillRect(i*34,0,34,SH);
    ctx.fillRect(i*34,H-SH,34,SH);
  }
}

// ════════════════════════════════════════════════════════════════════
//  COLUMNA IZQUIERDA
// ════════════════════════════════════════════════════════════════════
const cvL=document.getElementById('cv-left'), ctxL=cvL.getContext('2d');
let lBob=0;

function resizeLeft(){ cvL.height=window.innerHeight; }

function drawLeft(){
  lBob+=0.022;
  const W=300, H=cvL.height;
  const GY=Math.round(H*GROUND_RATIO), WY=Math.round(H*WATER_RATIO);
  ctxL.clearRect(0,0,W,H);

  // Palma silhouette borde izquierdo
  di(ctxL,'bgPalm',-35,GY-H*.68,190,H*.70);
  // Palmera pixel interior (hacia el centro)
  const pp=IMG.pixPalm;
  if(pp&&pp.naturalWidth){
    const ph=Math.round(H*.40),pw=Math.round(ph*pp.naturalWidth/pp.naturalHeight);
    ctxL.drawImage(pp,W-pw+18,GY-ph+8,pw,ph);
  }
  // Logo
  const li=IMG.logo;
  if(li&&li.naturalWidth){
    const lw=190,lh=Math.round(lw*li.naturalHeight/li.naturalWidth);
    ctxL.drawImage(li,Math.round(W/2-lw/2),Math.round(22+(80-lh)/2),lw,lh);
  }
  // Suelo arena
  di(ctxL,'sand',-10,GY-14,W+20,Math.round(H*.10));
  ctxL.fillStyle='#F2C19E'; ctxL.fillRect(0,GY+Math.round(H*.04),W,WY-GY);
  ctxL.fillStyle='#2DC8B2'; ctxL.fillRect(0,WY,W,H-WY-20);
  // Señal VIVE AHORA
  const sg=IMG.sign;
  if(sg&&sg.naturalWidth){ const sh=88,sw=Math.round(sh*sg.naturalWidth/sg.naturalHeight); ctxL.drawImage(sg,18,GY-sh+4,sw,sh); }
  // Maleta
  const su=IMG.suitcase;
  if(su&&su.naturalWidth){ const sh=68,sw=Math.round(sh*su.naturalWidth/su.naturalHeight); ctxL.drawImage(su,Math.round(W/2+10),GY-sh+2,sw,sh); }
  // Pato animado
  const dy=Math.sin(lBob)*6, dk=IMG.duck0;
  if(dk&&dk.naturalWidth) ctxL.drawImage(dk,W-86,GY-80+dy,78,78);
  // Franjas
  stripes(ctxL,W,H);
}

// ════════════════════════════════════════════════════════════════════
//  COLUMNA DERECHA
// ════════════════════════════════════════════════════════════════════
const cvR=document.getElementById('cv-right'), ctxR=cvR.getContext('2d');

function resizeRight(){ cvR.height=window.innerHeight; }

function drawRight(){
  const W=300,H=cvR.height;
  const GY=Math.round(H*GROUND_RATIO),WY=Math.round(H*WATER_RATIO);
  ctxR.clearRect(0,0,W,H);
  // Palma silhouette borde derecho (espejo)
  const bp=IMG.bgPalm;
  if(bp&&bp.naturalWidth){ ctxR.save(); ctxR.scale(-1,1); ctxR.drawImage(bp,-W+35-190+W,GY-H*.68,190,H*.70); ctxR.restore(); }
  // Pixel palm interior espejo
  const pp=IMG.pixPalm;
  if(pp&&pp.naturalWidth){
    const ph=Math.round(H*.40),pw=Math.round(ph*pp.naturalWidth/pp.naturalHeight);
    ctxR.save(); ctxR.scale(-1,1); ctxR.drawImage(pp,-(pw-18),GY-ph+8,pw,ph); ctxR.restore();
  }
  di(ctxR,'sand',-10,GY-14,W+20,Math.round(H*.10));
  ctxR.fillStyle='#F2C19E'; ctxR.fillRect(0,GY+Math.round(H*.04),W,WY-GY);
  ctxR.fillStyle='#2DC8B2'; ctxR.fillRect(0,WY,W,H-WY-20);
  stripes(ctxR,W,H);
}

// ════════════════════════════════════════════════════════════════════
//  BANNER 300×600
// ════════════════════════════════════════════════════════════════════
const BW=300,BH=600;
const bEl=document.getElementById('banner'), bCtx=bEl.getContext('2d');
let bBob=0, bSkin=0;

function drawBanner(){
  bBob+=0.05;
  bCtx.clearRect(0,0,BW,BH);
  // Fondo card blanca
  const bg=bCtx.createLinearGradient(0,0,0,BH);
  bg.addColorStop(0,'#FFFCF5'); bg.addColorStop(.55,'#FFF5EE'); bg.addColorStop(1,'#DCF8F5');
  bCtx.fillStyle=bg; bCtx.fillRect(0,0,BW,BH);
  // Franja top
  for(let i=0;i*34<BW+34;i++){ bCtx.fillStyle=STRIPE_3[i%3]; bCtx.fillRect(i*34,0,34,12); }
  // Logo
  const li=IMG.logo;
  if(li&&li.naturalWidth){ const lw=200,lh=Math.round(lw*li.naturalHeight/li.naturalWidth); bCtx.drawImage(li,Math.round(BW/2-lw/2),Math.round(12+4+(70-lh)/2),lw,lh); }
  // Separador
  bCtx.fillStyle='rgba(0,0,0,.08)'; bCtx.fillRect(20,88,BW-40,1);
  // Subtítulo
  bCtx.save(); bCtx.textAlign='center'; bCtx.font=`7px ${PIXEL}`; bCtx.fillStyle='#999';
  bCtx.fillText('¡EL FESTIVAL DEL VERANO!',BW/2,104); bCtx.restore();
  // Mini escena
  const sky=bCtx.createLinearGradient(0,112,0,350);
  sky.addColorStop(0,'#F7A84E'); sky.addColorStop(.5,'#ED7B8A'); sky.addColorStop(1,'#C480B8');
  bCtx.fillStyle=sky; bCtx.fillRect(0,112,BW,238);
  di(bCtx,'bgPalm',-14,112,100,240);
  bCtx.save(); bCtx.scale(-1,1); di(bCtx,'bgPalm',-BW-14,112,100,240); bCtx.restore();
  bCtx.fillStyle='#F2C19E'; bCtx.fillRect(0,344,BW,38);
  bCtx.fillStyle='#2DC8B2'; bCtx.fillRect(0,382,BW,28);
  // Duck
  const dy=Math.sin(bBob)*7, dSz=148;
  di(bCtx,'duck'+bSkin,Math.round(BW/2-dSz/2),Math.round(195+dy),dSz,dSz);
  // Botón CTA
  const bw=248,bh=50,bx=Math.round(BW/2-bw/2),by=422;
  bCtx.save();
  const g2=bCtx.createLinearGradient(bx,by,bx,by+bh);
  g2.addColorStop(0,'#FF6B35'); g2.addColorStop(1,'#E91E8C');
  bCtx.fillStyle=g2; bCtx.shadowColor='rgba(233,30,140,.4)'; bCtx.shadowBlur=14;
  rr(bCtx,bx,by,bw,bh,25); bCtx.fill();
  bCtx.fillStyle='white'; bCtx.font=`10px ${PIXEL}`; bCtx.textAlign='center'; bCtx.shadowBlur=0;
  bCtx.fillText('▶  JUGAR AHORA',BW/2,by+32); bCtx.restore();
  bCtx.save(); bCtx.textAlign='center'; bCtx.fillStyle='#bbb'; bCtx.font=`6px ${PIXEL}`;
  bCtx.fillText('PULSA PARA ELEGIR TU PATO',BW/2,488); bCtx.restore();
  // Maleta deco
  const su=IMG.suitcase;
  if(su&&su.naturalWidth){ const sh=46,sw=Math.round(sh*su.naturalWidth/su.naturalHeight); bCtx.drawImage(su,14,by-sh-2,sw,sh); }
  // Franja bottom
  for(let i=0;i*34<BW+34;i++){ bCtx.fillStyle=STRIPE_3[(i+1)%3]; bCtx.fillRect(i*34,BH-12,34,12); }
  // Loading
  if(assetsLoaded<assetsTotal){
    bCtx.save(); bCtx.fillStyle='rgba(255,255,255,.7)'; bCtx.fillRect(0,0,BW,BH);
    bCtx.fillStyle='#555'; bCtx.font=`8px ${PIXEL}`; bCtx.textAlign='center';
    bCtx.fillText('CARGANDO...',BW/2,BH/2); bCtx.restore();
  }
}
bEl.addEventListener('click',()=>{ if(assetsLoaded>=assetsTotal) openSkin(); });
bEl.addEventListener('touchstart',e=>{ e.preventDefault(); if(assetsLoaded>=assetsTotal) openSkin(); },{passive:false});

// ════════════════════════════════════════════════════════════════════
//  PANEL CENTRAL DE INICIO  (480×520)
// ════════════════════════════════════════════════════════════════════
const PNW=480, PNH=520;
const pnEl=document.getElementById('cv-start'), pnCtx=pnEl.getContext('2d');
let pnBob=0, pnSkin=0;

// 5 ducks en fila: 2 filas (3+2) para que quepan mejor
const PN_SZ=78, PN_GAP=14;
const PN_ROW1_X = (PNW - 3*(PN_SZ+PN_GAP)+PN_GAP) / 2;
const PN_ROW2_X = (PNW - 2*(PN_SZ+PN_GAP)+PN_GAP) / 2;
const PN_ROW_Y1 = 186, PN_ROW_Y2 = PN_ROW_Y1 + PN_SZ + 20;

function pnDuckRect(i){
  if(i<3) return { x: PN_ROW1_X + i*(PN_SZ+PN_GAP), y: PN_ROW_Y1 };
  return   { x: PN_ROW2_X + (i-3)*(PN_SZ+PN_GAP), y: PN_ROW_Y2 };
}

function drawStartPanel(){
  pnBob+=0.04;
  pnCtx.clearRect(0,0,PNW,PNH);

  // Fondo card
  const bg=pnCtx.createLinearGradient(0,0,0,PNH);
  bg.addColorStop(0,'rgba(255,252,245,.97)'); bg.addColorStop(1,'rgba(220,248,245,.97)');
  pnCtx.fillStyle=bg; rr(pnCtx,0,0,PNW,PNH,20); pnCtx.fill();

  // Franja top
  for(let i=0;i*34<PNW+34;i++){ pnCtx.fillStyle=STRIPE_3[i%3]; pnCtx.fillRect(i*34,0,34,14); }

  // Logo
  const li=IMG.logo;
  if(li&&li.naturalWidth){
    const lw=220,lh=Math.round(lw*li.naturalHeight/li.naturalWidth);
    pnCtx.drawImage(li,Math.round(PNW/2-lw/2),Math.round(14+6+(80-lh)/2),lw,lh);
  }

  // Separador
  pnCtx.fillStyle='rgba(0,0,0,.08)'; pnCtx.fillRect(24,106,PNW-48,1);

  // Título
  pnCtx.save();
  pnCtx.textAlign='center'; pnCtx.font=`9px ${PIXEL}`; pnCtx.fillStyle='#444';
  pnCtx.shadowColor='rgba(0,0,0,.12)'; pnCtx.shadowBlur=4;
  pnCtx.fillText('ELIGE TU PATO',PNW/2,164); pnCtx.restore();

  // Ducks (3+2)
  for(let i=0;i<5;i++){
    const d=pnDuckRect(i), sel=pnSkin===i;
    const sz=sel?PN_SZ+10:PN_SZ, ox=sel?-5:0, oy=sel?-5:0;
    if(sel){
      pnCtx.save(); pnCtx.shadowColor='#FFD700'; pnCtx.shadowBlur=20;
      pnCtx.fillStyle='rgba(255,215,0,.18)';
      rr(pnCtx,d.x+ox-6,d.y+oy-6,sz+12,sz+12,12); pnCtx.fill();
      pnCtx.strokeStyle='#FFD700'; pnCtx.lineWidth=2.5; pnCtx.stroke();
      pnCtx.restore();
    }
    di(pnCtx,'duck'+i,d.x+ox,d.y+oy,sz,sz);
  }

  // Botón START
  const bw=280,bh=52,bx=Math.round(PNW/2-bw/2),by=PN_ROW_Y2+PN_SZ+24;
  pnCtx.save();
  const g2=pnCtx.createLinearGradient(bx,by,bx,by+bh);
  g2.addColorStop(0,'#FF6B35'); g2.addColorStop(1,'#E91E8C');
  pnCtx.fillStyle=g2; pnCtx.shadowColor='rgba(233,30,140,.45)'; pnCtx.shadowBlur=16;
  rr(pnCtx,bx,by,bw,bh,26); pnCtx.fill();
  pnCtx.fillStyle='white'; pnCtx.font=`12px ${PIXEL}`;
  pnCtx.textAlign='center'; pnCtx.shadowBlur=0;
  pnCtx.fillText('▶  START GAME',PNW/2,by+34); pnCtx.restore();

  // Tagline
  pnCtx.save(); pnCtx.textAlign='center'; pnCtx.fillStyle='#bbb'; pnCtx.font=`6px ${PIXEL}`;
  pnCtx.fillText('TAP/CLICK EN TU PATO · LUEGO START',PNW/2,PNH-20); pnCtx.restore();

  // Franja bottom
  for(let i=0;i*34<PNW+34;i++){ pnCtx.fillStyle=STRIPE_3[(i+1)%3]; pnCtx.fillRect(i*34,PNH-14,34,14); }

  if(assetsLoaded<assetsTotal){
    pnCtx.save(); pnCtx.fillStyle='rgba(255,255,255,.8)'; rr(pnCtx,0,0,PNW,PNH,20); pnCtx.fill();
    pnCtx.fillStyle='#555'; pnCtx.font=`8px ${PIXEL}`; pnCtx.textAlign='center';
    pnCtx.fillText('CARGANDO...',PNW/2,PNH/2); pnCtx.restore();
  }
}

function pnTap(ex,ey){
  if(assetsLoaded<assetsTotal) return;
  const rect=pnEl.getBoundingClientRect();
  const scX=PNW/rect.width, scY=PNH/rect.height;
  const x=(ex-rect.left)*scX, y=(ey-rect.top)*scY;
  // Duck hit
  for(let i=0;i<5;i++){
    const d=pnDuckRect(i);
    if(x>=d.x-8&&x<=d.x+PN_SZ+8&&y>=d.y-8&&y<=d.y+PN_SZ+8){ pnSkin=i; bSkin=i; return; }
  }
  // Botón START
  const bw=280,bh=52,bx=Math.round(PNW/2-bw/2),by=PN_ROW_Y2+PN_SZ+24;
  if(x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh) openGame(pnSkin);
}
pnEl.addEventListener('click',      e=>pnTap(e.clientX,e.clientY));
pnEl.addEventListener('touchstart', e=>{ e.preventDefault(); pnTap(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});

// Escala el panel para que quepa en la pantalla (entre las columnas skin)
function resizeStartPanel(){
  const maxW = window.innerWidth - 600;  // 300px left + 300px right
  const maxH = window.innerHeight - 40;
  const r = Math.min(maxW/PNW, maxH/PNH, 1);
  pnEl.style.width  = Math.round(PNW*r)+'px';
  pnEl.style.height = Math.round(PNH*r)+'px';
}

// ════════════════════════════════════════════════════════════════════
//  SKIN SELECTOR OVERLAY  (960×540)
// ════════════════════════════════════════════════════════════════════
const SW=960,SH=540;
const skEl=document.getElementById('skin-canvas'), skCtx=skEl.getContext('2d');
const skOv=document.getElementById('skin-overlay');
let chosenSkin=0;

const SK_SZ=120,SK_GAP=22;
const SK_ROW_W=5*SK_SZ+4*SK_GAP, SK_ROW_X=(SW-SK_ROW_W)/2, SK_ROW_Y=SH/2-SK_SZ/2+14;
function skDuckRect(i){ return {x:SK_ROW_X+i*(SK_SZ+SK_GAP),y:SK_ROW_Y}; }

function srr(x,y,w,h,r){
  skCtx.beginPath(); skCtx.moveTo(x+r,y);
  skCtx.arcTo(x+w,y,x+w,y+h,r); skCtx.arcTo(x+w,y+h,x,y+h,r);
  skCtx.arcTo(x,y+h,x,y,r); skCtx.arcTo(x,y,x+w,y,r); skCtx.closePath();
}

function drawSkinScreen(){
  const og=skCtx.createLinearGradient(0,0,0,SH);
  og.addColorStop(0,'#F7A84E'); og.addColorStop(.4,'#ED7B8A'); og.addColorStop(.7,'#C480B8'); og.addColorStop(1,'#2DC8B2');
  skCtx.fillStyle=og; skCtx.fillRect(0,0,SW,SH);
  for(let i=0;i*34<SW+34;i++){ skCtx.fillStyle=STRIPE_3[i%3]; skCtx.fillRect(i*34,0,34,16); skCtx.fillRect(i*34,SH-16,34,16); }
  di(skCtx,'bgPalm',-40,60,200,SH*.75);
  skCtx.save(); skCtx.scale(-1,1); di(skCtx,'bgPalm',-SW-40,60,200,SH*.75); skCtx.restore();
  const pp=IMG.pixPalm;
  if(pp&&pp.naturalWidth){
    const ph=Math.round(SH*.42),pw=Math.round(ph*pp.naturalWidth/pp.naturalHeight);
    skCtx.drawImage(pp,260,SH*.28,pw,ph);
    skCtx.save(); skCtx.scale(-1,1); skCtx.drawImage(pp,-SW+260,SH*.28,pw,ph); skCtx.restore();
  }
  di(skCtx,'sand',0,SH-70,SW,52); skCtx.fillStyle='#2DC8B2'; skCtx.fillRect(0,SH-24,SW,8);
  const li=IMG.logo;
  if(li&&li.naturalWidth){ const lw=220,lh=lw*li.naturalHeight/li.naturalWidth; skCtx.drawImage(li,SW/2-lw/2,18,lw,lh); }
  skCtx.save(); skCtx.textAlign='center'; skCtx.fillStyle='white'; skCtx.font=`12px ${PIXEL}`;
  skCtx.shadowColor='rgba(0,0,0,.65)'; skCtx.shadowBlur=8; skCtx.fillText('ELIGE TU PATO',SW/2,SK_ROW_Y-30); skCtx.restore();
  for(let i=0;i<5;i++){
    const d=skDuckRect(i),sel=chosenSkin===i;
    const sz=sel?SK_SZ+16:SK_SZ,ox=sel?-8:0,oy=sel?-8:0;
    if(sel){ skCtx.save(); skCtx.shadowColor='#FFD700'; skCtx.shadowBlur=28; skCtx.fillStyle='rgba(255,215,0,.25)'; srr(d.x+ox-8,d.y+oy-8,sz+16,sz+16,16); skCtx.fill(); skCtx.strokeStyle='#FFD700'; skCtx.lineWidth=3; skCtx.stroke(); skCtx.restore(); }
    di(skCtx,'duck'+i,d.x+ox,d.y+oy,sz,sz);
    skCtx.save(); skCtx.textAlign='center'; skCtx.fillStyle=sel?'#FFD700':'rgba(255,255,255,.7)'; skCtx.font=`6px ${PIXEL}`; skCtx.fillText('PATO '+(i+1),d.x+SK_SZ/2,d.y+SK_SZ+15); skCtx.restore();
  }
  const bw=280,bh=52,bx=SW/2-bw/2,by=SK_ROW_Y+SK_SZ+44;
  skCtx.save();
  const g2=skCtx.createLinearGradient(bx,by,bx,by+bh); g2.addColorStop(0,'#FF6B35'); g2.addColorStop(1,'#E91E8C');
  skCtx.fillStyle=g2; skCtx.shadowColor='rgba(233,30,140,.5)'; skCtx.shadowBlur=20;
  srr(bx,by,bw,bh,26); skCtx.fill();
  skCtx.fillStyle='white'; skCtx.font=`13px ${PIXEL}`; skCtx.textAlign='center'; skCtx.shadowBlur=0;
  skCtx.fillText('▶  START GAME',SW/2,by+34); skCtx.restore();
}

function skinTap(ex,ey){
  const rect=skEl.getBoundingClientRect(),x=(ex-rect.left)*(SW/rect.width),y=(ey-rect.top)*(SH/rect.height);
  for(let i=0;i<5;i++){ const d=skDuckRect(i); if(x>=d.x-10&&x<=d.x+SK_SZ+10&&y>=d.y-10&&y<=d.y+SK_SZ+10){chosenSkin=i;return;} }
  const bw=280,bh=52,bx=SW/2-bw/2,by=SK_ROW_Y+SK_SZ+44;
  if(x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh) openGame(chosenSkin);
}
skEl.addEventListener('click',e=>skinTap(e.clientX,e.clientY));
skEl.addEventListener('touchstart',e=>{e.preventDefault();skinTap(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});

let skinLoopActive=false;
function skinLoop(){ if(!skOv.classList.contains('open')){skinLoopActive=false;return;} skCtx.clearRect(0,0,SW,SH); drawSkinScreen(); requestAnimationFrame(skinLoop); }
function openSkin(){ skOv.classList.add('open'); resizeCanvas(skEl); if(!skinLoopActive){skinLoopActive=true;skinLoop();} }
function closeSkin(){ skOv.classList.remove('open'); }
document.getElementById('skin-xbtn').addEventListener('click',closeSkin);
document.getElementById('skin-xbtn').addEventListener('touchstart',e=>{e.preventDefault();closeSkin();},{passive:false});

// ════════════════════════════════════════════════════════════════════
//  GAME  (960×540)
// ════════════════════════════════════════════════════════════════════
const GW=960,GH=540,PX=82,PY=20,PW=796,PH=500,PR=22;
const GROUND_Y=PY+355,WATER_Y=PY+435,DUCK_W=72,DUCK_H=72,DUCK_X=PX+160,DUCK_GY=GROUND_Y-DUCK_H/2;
const GRAVITY=0.65,JUMP_V=-15.5,BASE_SPD=5,ENERGY_MAX=10;
const STRIPE_COLS=['#F5A14A','#F0896A','#E96880','#D07AC0','#9B72C5','#5BA8E8','#2DC8B2','#50D4A0'];
const BG_PALMS=[{bx:60,s:.85},{bx:210,s:1.1},{bx:370,s:.65},{bx:520,s:.95},{bx:670,s:.75},{bx:820,s:1.05},{bx:980,s:.80},{bx:1150,s:.90}];
const OUTER_PALMS=[{x:-28,y:PY-10,w:138,h:440},{x:GW-110,y:PY-10,w:138,h:440}];
const OB_DEF={ramp:{kind:'ramp',w:175,h:140,hx:28,collect:false},flamingo:{kind:'flamingo',w:88,h:75,hx:6,collect:false},palmObs:{kind:'palmObs',w:58,h:100,hx:5,collect:false},copa:{kind:'copa',w:44,h:62,hx:0,collect:true},bottle:{kind:'bottle',w:34,h:80,hx:0,collect:true}};
const SPAWN_TBL=['ramp','ramp','ramp','ramp','flamingo','flamingo','flamingo','palmObs','palmObs','copa','copa','copa','bottle'];
const SIGN_POS=[300,820,1340];

const gEl=document.getElementById('game'),gCtx=gEl.getContext('2d'),gOv=document.getElementById('game-overlay');
let gameSkin=0,gameActive=false,duck={},obstacles=[],particles=[],score=0,best=0,spd=BASE_SPD,frame=0,energy=ENERGY_MAX,bgOff=0;

function gdi(k,x,y,w,h){const im=IMG[k];if(im&&im.naturalWidth)gCtx.drawImage(im,x,y,w,h);}
function grr(x,y,w,h,r){gCtx.beginPath();gCtx.moveTo(x+r,y);gCtx.arcTo(x+w,y,x+w,y+h,r);gCtx.arcTo(x+w,y+h,x,y+h,r);gCtx.arcTo(x,y+h,x,y,r);gCtx.arcTo(x,y,x+w,y,r);gCtx.closePath();}
function resetDuck(){duck={y:DUCK_GY,vy:0,jumps:0,bob:0,hurt:0};}
function resetGame(sk){gameSkin=sk;resetDuck();obstacles=[];particles=[];score=0;spd=BASE_SPD;frame=0;energy=ENERGY_MAX;bgOff=0;}
function spawnOb(){const key=SPAWN_TBL[Math.floor(Math.random()*SPAWN_TBL.length)];const d=OB_DEF[key];obstacles.push({...d,x:GW+40,y:GROUND_Y-d.h,done:false});}
function burst(x,y,col){for(let i=0;i<8;i++){const a=Math.PI*2*i/8;particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3)-2,life:42,color:col,r:3+Math.random()*3});}}

function update(){
  frame++;bgOff+=spd;duck.vy+=GRAVITY;duck.y+=duck.vy;
  if(duck.y>=DUCK_GY){duck.y=DUCK_GY;duck.vy=0;duck.jumps=0;}
  duck.bob+=0.13;if(duck.hurt>0)duck.hurt--;
  if(frame%450===0)spd=Math.min(spd+0.3,9);
  if(frame%6===0)score++;if(frame%75===0&&energy>0)energy--;
  if(energy<=0){if(score>best)best=score;gameActive=false;return;}
  const pixGap=Math.max(320,450-(spd-BASE_SPD)*17),interval=Math.max(42,Math.floor(pixGap/spd));
  if(frame%interval===0)spawnOb();
  for(const ob of obstacles)ob.x-=spd;
  const m=9,dL=DUCK_X-DUCK_W/2+m,dR=DUCK_X+DUCK_W/2-m,dT=duck.y-DUCK_H/2+m,dB=duck.y+DUCK_H/2-m;
  for(const ob of obstacles){
    if(ob.done)continue;
    const hm=ob.hx+m,hit=dR>ob.x+hm&&dL<ob.x+ob.w-hm&&dB>ob.y+m&&dT<ob.y+ob.h-m;
    if(!hit)continue;
    if(ob.collect){ob.done=true;if(ob.kind==='copa'){score+=5;energy=Math.min(ENERGY_MAX,energy+1);burst(ob.x+ob.w/2,ob.y+ob.h/2,'#E91E8C');}if(ob.kind==='bottle'){score+=12;energy=Math.min(ENERGY_MAX,energy+2);burst(ob.x+ob.w/2,ob.y+ob.h/2,'#FF9800');}}
    else if(duck.hurt===0){ob.done=true;duck.hurt=70;energy=Math.max(0,energy-3);burst(ob.x+ob.w/2,ob.y+ob.h/2,'#FF4444');if(energy<=0){if(score>best)best=score;gameActive=false;return;}}
  }
  obstacles=obstacles.filter(ob=>!ob.done&&ob.x>-220);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life--;}
  particles=particles.filter(p=>p.life>0);
}
function drawOuterFrame(){
  const og=gCtx.createLinearGradient(0,0,0,GH);og.addColorStop(0,'#F5A14A');og.addColorStop(.5,'#E0709A');og.addColorStop(1,'#8B5FBF');
  gCtx.fillStyle=og;gCtx.fillRect(0,0,GW,GH);
  for(const p of OUTER_PALMS)gdi('bgPalm',p.x,p.y,p.w,p.h);
  for(let i=0;i*40<GW;i++){gCtx.fillStyle=STRIPE_COLS[i%STRIPE_COLS.length];gCtx.fillRect(i*40,0,40,16);gCtx.fillRect(i*40,GH-16,40,16);}
}
function drawScene(off){
  const sky=gCtx.createLinearGradient(PX,PY,PX,PY+260);sky.addColorStop(0,'#F7A84E');sky.addColorStop(.5,'#ED7B8A');sky.addColorStop(1,'#C480B8');
  gCtx.fillStyle=sky;gCtx.fillRect(PX,PY,PW,GROUND_Y-PY);
  const wrapBg=PW+220;
  for(const p of BG_PALMS){const x=PX+((p.bx-off*.18)%wrapBg+wrapBg)%wrapBg-40;gdi('bgPalm',x,GROUND_Y-Math.round(200*p.s),Math.round(64*p.s),Math.round(200*p.s));}
  const bx2=PX+((80-off*.08)%(PW+600)+(PW+600))%(PW+600)-20;
  if(bx2>PX-130&&bx2<PX+PW+10){gCtx.fillStyle='#C04E22';gCtx.fillRect(bx2,GROUND_Y-148,115,148);gCtx.fillStyle='#A83E18';gCtx.fillRect(bx2,GROUND_Y-160,115,14);gCtx.fillStyle='rgba(255,215,90,.62)';for(let row=0;row<3;row++)for(let col=0;col<3;col++)gCtx.fillRect(bx2+4+col*32,GROUND_Y-134+row*42,20,26);}
  const hOff=(off*.10)%(PW+500);
  for(let tile=-1;tile<2;tile++){const hx=PX+tile*(PW+300)-hOff;if(hx+PW+300<PX||hx>PX+PW)continue;gCtx.save();gCtx.beginPath();gCtx.moveTo(hx+160,GROUND_Y);gCtx.bezierCurveTo(hx+260,GROUND_Y,hx+300,GROUND_Y-108,hx+400,GROUND_Y-108);gCtx.bezierCurveTo(hx+500,GROUND_Y-108,hx+540,GROUND_Y,hx+640,GROUND_Y);gCtx.lineTo(hx+PW+300,GROUND_Y);gCtx.lineTo(hx+PW+300,WATER_Y);gCtx.lineTo(hx-20,WATER_Y);gCtx.lineTo(hx-20,GROUND_Y);gCtx.closePath();gCtx.fillStyle='#F2C19E';gCtx.fill();gCtx.restore();}
  const sg=gCtx.createLinearGradient(0,GROUND_Y,0,WATER_Y);sg.addColorStop(0,'#F2C19E');sg.addColorStop(1,'#E5B08A');gCtx.fillStyle=sg;gCtx.fillRect(PX,GROUND_Y,PW,WATER_Y-GROUND_Y);gCtx.fillStyle='rgba(0,0,0,.08)';gCtx.fillRect(PX,GROUND_Y,PW,6);
  const wg=gCtx.createLinearGradient(0,WATER_Y,0,PY+PH);wg.addColorStop(0,'#2DC8B2');wg.addColorStop(1,'#1AA898');gCtx.fillStyle=wg;gCtx.fillRect(PX,WATER_Y,PW,PY+PH-WATER_Y);gCtx.fillStyle='#22B5A0';gCtx.fillRect(PX,WATER_Y,PW,5);
  const wrapS=PW+600;for(const sp of SIGN_POS){const sx=PX+((sp-off*.45)%wrapS+wrapS)%wrapS;if(sx>PX-80&&sx<PX+PW+10)gdi('sign',sx-34,GROUND_Y-82,68,82);}
}
function drawObjects(){for(const ob of obstacles){if(!ob.done)gdi(ob.kind,ob.x,ob.y,ob.w,ob.h);}}
function drawParticles(){for(const p of particles){gCtx.save();gCtx.globalAlpha=p.life/42;gCtx.fillStyle=p.color;gCtx.beginPath();gCtx.arc(p.x,p.y,p.r,0,Math.PI*2);gCtx.fill();gCtx.restore();}}
function drawDuck(){
  const bob=duck.y>=DUCK_GY-1?Math.sin(duck.bob)*2:0,lean=duck.vy<-4?-0.13:duck.vy>4?0.09:0;
  const gd=Math.max(0,GROUND_Y-(duck.y+DUCK_H/2));
  gCtx.save();gCtx.globalAlpha=Math.max(0,.22-gd*.002);gCtx.fillStyle='#000';gCtx.beginPath();gCtx.ellipse(DUCK_X,GROUND_Y+5,Math.max(10,DUCK_W/2.6-gd*.3),6,0,0,Math.PI*2);gCtx.fill();gCtx.restore();
  gCtx.save();gCtx.translate(DUCK_X,duck.y+bob);gCtx.rotate(lean);if(duck.hurt>0&&Math.floor(duck.hurt/6)%2)gCtx.globalAlpha=.35;gdi('duck'+gameSkin,-DUCK_W/2,-DUCK_H/2,DUCK_W,DUCK_H);gCtx.restore();
}
function drawHUD(){
  const li=IMG.logo;if(li&&li.naturalWidth){const lw=190,lh=lw*li.naturalHeight/li.naturalWidth;gCtx.drawImage(li,GW/2-lw/2,PY+6,lw,lh);}
  gCtx.save();gCtx.font=`bold 22px ${PIXEL}`;gCtx.fillStyle='#1a1a1a';gCtx.textAlign='right';gCtx.fillText(String(score).padStart(5,'0'),PX+PW-14,PY+36);
  const cw=21,ch=13,cgap=3,barX=PX+PW-14-ENERGY_MAX*(cw+cgap)+cgap,barY=PY+PH-30;
  gCtx.fillStyle='rgba(255,255,255,.7)';gCtx.font=`7px ${PIXEL}`;gCtx.textAlign='right';gCtx.fillText('ENERGY',PX+PW-14,barY-5);
  for(let i=0;i<ENERGY_MAX;i++){const cx=barX+i*(cw+cgap);gCtx.shadowColor=i<energy?'rgba(255,200,0,.7)':'none';gCtx.shadowBlur=i<energy?6:0;gCtx.fillStyle=i<energy?'#FFD700':'rgba(255,255,255,.22)';grr(cx,barY,cw,ch,3);gCtx.fill();if(i<energy){gCtx.shadowBlur=0;gCtx.fillStyle='rgba(255,255,255,.30)';gCtx.fillRect(cx+2,barY+2,cw-4,4);}}
  gCtx.restore();
}
function drawGameOver(){
  gCtx.fillStyle='rgba(0,0,0,.48)';gCtx.fillRect(PX,PY,PW,PH);
  const pw=580,ph=330,px2=GW/2-290,py2=GH/2-165;
  gCtx.save();gCtx.fillStyle='#F2C19E';gCtx.shadowColor='rgba(0,0,0,.45)';gCtx.shadowBlur=28;grr(px2,py2,pw,ph,24);gCtx.fill();gCtx.textAlign='center';
  gCtx.fillStyle='#222';gCtx.font=`26px ${PIXEL}`;gCtx.fillText('GAME OVER',GW/2,py2+72);
  gCtx.fillStyle='#555';gCtx.font=`11px ${PIXEL}`;gCtx.fillText('TU PUNTUACIÓN:',GW/2,py2+118);
  gCtx.fillStyle='#E91E8C';gCtx.font=`bold 52px ${PIXEL}`;gCtx.fillText(score,GW/2,py2+190);
  if(score>0&&score>=best){gCtx.fillStyle='#F5A623';gCtx.font=`10px ${PIXEL}`;gCtx.fillText('!! NUEVO RECORD !!',GW/2,py2+220);}
  else if(best>0){gCtx.fillStyle='#aaa';gCtx.font=`9px ${PIXEL}`;gCtx.fillText('Record: '+best,GW/2,py2+220);}
  gCtx.restore();
  const bbw=420,bbh=52,bbx=GW/2-210,bby=py2+ph-72;
  gCtx.save();gCtx.fillStyle='#1a1a1a';gCtx.shadowColor='rgba(0,0,0,.4)';gCtx.shadowBlur=10;grr(bbx,bby,bbw,bbh,26);gCtx.fill();
  gCtx.font=`9px ${PIXEL}`;gCtx.fillStyle='white';gCtx.shadowBlur=0;gCtx.textAlign='left';gCtx.fillText('PULSA AL PATO',bbx+18,bby+31);gCtx.textAlign='right';gCtx.fillText('PARA SEGUIR',bbx+bbw-18,bby+31);
  gdi('duck'+gameSkin,GW/2-18,bby+4,36,42);gCtx.restore();
}
function clipPanel(){grr(PX,PY,PW,PH,PR);gCtx.clip();}
function strokePanel(){gCtx.save();gCtx.strokeStyle='rgba(255,255,255,.85)';gCtx.lineWidth=3;grr(PX,PY,PW,PH,PR);gCtx.stroke();gCtx.restore();}
function gameLoop(){
  if(!gOv.classList.contains('open'))return;
  if(gameActive)update();
  gCtx.clearRect(0,0,GW,GH);drawOuterFrame();
  gCtx.save();clipPanel();drawScene(bgOff);drawObjects();drawParticles();drawDuck();drawHUD();gCtx.restore();
  strokePanel();if(!gameActive)drawGameOver();requestAnimationFrame(gameLoop);
}
function gameTap(){if(!gameActive){closeGame();return;}if(duck.jumps<2){duck.vy=JUMP_V;duck.jumps++;}}
gEl.addEventListener('click',()=>gameTap());
gEl.addEventListener('touchstart',e=>{e.preventDefault();gameTap();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&gOv.classList.contains('open')){e.preventDefault();gameTap();}if(e.code==='Escape'){closeGame();closeSkin();}});

// ── RESIZE ─────────────────────────────────────────────────────────
function resizeCanvas(el){
  const r=Math.min(window.innerWidth*.96/el.width,window.innerHeight*.96/el.height);
  el.style.width=Math.round(el.width*r)+'px';el.style.height=Math.round(el.height*r)+'px';
}
function onResize(){ resizeLeft(); resizeRight(); resizeStartPanel(); resizeCanvas(skEl); resizeCanvas(gEl); }
window.addEventListener('resize',onResize);

// ── OPEN / CLOSE ───────────────────────────────────────────────────
function openGame(sk){
  closeSkin(); resetGame(sk); gameActive=true;
  gOv.classList.add('open'); resizeCanvas(gEl); gameLoop();
}
function closeGame(){
  gameActive=false; gOv.classList.remove('open');
  chosenSkin=gameSkin; pnSkin=gameSkin; bSkin=gameSkin;
}
document.getElementById('game-xbtn').addEventListener('click',closeGame);
document.getElementById('game-xbtn').addEventListener('touchstart',e=>{e.preventDefault();closeGame();},{passive:false});

// ── MAIN LOOP ──────────────────────────────────────────────────────
function mainLoop(){ drawLeft(); drawRight(); drawBanner(); drawStartPanel(); requestAnimationFrame(mainLoop); }

resizeLeft(); resizeRight(); resizeStartPanel(); resizeCanvas(skEl); resizeCanvas(gEl);
mainLoop();
})();
</script>
